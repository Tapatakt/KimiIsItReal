<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <style>
    body {
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      width: 360px;
      margin: 0;
      padding: 16px;
      background: #fafafa;
      color: #222;
    }
    h1 {
      font-size: 16px;
      margin: 0 0 12px;
    }
    label {
      display: block;
      font-size: 13px;
      font-weight: 600;
      margin: 12px 0 4px;
    }
    textarea {
      width: 100%;
      min-height: 80px;
      padding: 8px;
      font-size: 13px;
      border: 1px solid #ccc;
      border-radius: 6px;
      resize: vertical;
      box-sizing: border-box;
    }
    .hint {
      font-size: 12px;
      color: #666;
      margin-top: 2px;
    }
    button {
      margin-top: 14px;
      width: 100%;
      padding: 10px;
      font-size: 14px;
      font-weight: 600;
      background: #7c3aed;
      color: #fff;
      border: none;
      border-radius: 6px;
      cursor: pointer;
    }
    button:hover {
      background: #6d28d9;
    }
    #status {
      margin-top: 8px;
      font-size: 13px;
      color: #15803d;
      min-height: 18px;
    }
  </style>
</head>
<body>
  <h1>Kimi Is It Real — Настройка промпта</h1>

  <label for="prefix">Часть до выделенного текста</label>
  <textarea id="prefix" placeholder="Например: Аккуратно проверь корректность фактов в этом тексте:"></textarea>
  <div class="hint">Выделенный текст будет вставлен с двойными переносами строк до и после него.</div>

  <label for="suffix">Часть после выделенного текста</label>
  <textarea id="suffix" placeholder="Например: Не удовлетворяйся одним источником на факт, ищи альтернативные. Приводи ссылки. В конце вынеси краткий вердикт по достоверности информации."></textarea>

  <button id="save">Сохранить</button>
  <div id="status"></div>

  <script src="popup.js"></script>
</body>
</html>
